nelmio_cors:
    defaults:
        allow_credentials: false
        allow_origin: ['http://localhost:5173']
        allow_headers: ['*']
        allow_methods: ['GET', 'POST', 'PUT', 'DELETE','PATCH', 'OPTIONS']

    paths:
        '^/':
            allow_origin: ['http://localhost:5173']
            allow_headers: ['*']
            allow_methods: ['GET', 'POST', 'PUT', 'DELETE','PATCH', 'OPTIONS']